<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Clone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #181818;
            color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #202020;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: red;
        }

        .search-box input {
            width: 400px;
            padding: 8px;
        }

        /* Sidebar */
        .container {
            display: flex;
        }

        .sidebar {
            width: 200px;
            background-color: #202020;
            padding: 15px;
            height: 100vh;
        }

        .sidebar p {
            margin: 10px 0;
            cursor: pointer;
        }

        .sidebar p:hover {
            color: red;
        }

        /* Videos */
        .content {
            flex: 1;
            padding: 20px;
        }

        .videos {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .video-card {
            background-color: #303030;
            padding: 10px;
            border-radius: 5px;
        }

        .thumbnail {
            width: 100%;
            height: 120px;
            background-color: black;
            margin-bottom: 10px;
        }

        .video-title {
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">YouTube</div>
    <div class="search-box">
        <input type="text" placeholder="Search">
    </div>
</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <p>Home</p>
        <p>Trending</p>
        <p>Subscriptions</p>
        <p>Library</p>
    </div>

    <!-- Content -->
    <div class="content">
        <h2>Recommended</h2>

        <div class="videos">
            <div class="video-card">
                <div class="thumbnail"></div>
                <div class="video-title">Video 1</div>
            </div>

            <div class="video-card">
                <div class="thumbnail"></div>
                <div class="video-title">Video 2</div>
            </div>

            <div class="video-card">
                <div class="thumbnail"></div>
                <div class="video-title">Video 3</div>
            </div>

            <div class="video-card">
                <div class="thumbnail"></div>
                <div class="video-title">Video 4</div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
